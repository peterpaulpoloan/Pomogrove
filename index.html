<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomogrove - Grow Your Knowledge</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- ============================================================
       FIREBASE CONFIG — fill in from your .env.local, never commit
       ============================================================ -->
  <script>
    window.__FIREBASE_CONFIG__ = {
      apiKey:            "VITE_FIREBASE_API_KEY",
      authDomain:        "VITE_FIREBASE_AUTH_DOMAIN",
      projectId:         "VITE_FIREBASE_PROJECT_ID",
      storageBucket:     "VITE_FIREBASE_STORAGE_BUCKET",
      messagingSenderId: "VITE_FIREBASE_MESSAGING_SENDER_ID",
      appId:             "VITE_FIREBASE_APP_ID",
    };
  </script>
  <!-- ============================================================ -->

  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, .brand { font-family: 'Outfit', sans-serif; }
    .tree-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.0.0",
      "react-dom": "https://esm.sh/react-dom@19.0.0",
      "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
      "react-router-dom": "https://esm.sh/react-router-dom@7.1.3",
      "lucide-react": "https://esm.sh/lucide-react@0.460.0",
      "react-chartjs-2": "https://esm.sh/react-chartjs-2@5.2.0",
      "chart.js": "https://esm.sh/chart.js@4.4.1",
      "firebase/app": "https://esm.sh/firebase@10.8.0/app",
      "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "react/": "https://esm.sh/react@^19.2.4/",
      "firebase/": "https://esm.sh/firebase@^12.9.0/",
      "express": "https://esm.sh/express@^5.2.1",
      "cors": "https://esm.sh/cors@^2.8.6",
      "pg": "https://esm.sh/pg@^8.18.0",
      "dotenv": "https://esm.sh/dotenv@^17.3.1"
    }
  }
  </script>
</head>
<body class="bg-stone-50 text-stone-900">
  <div id="root"></div>
  <script type="module" src="index.tsx"></script>
</body>
</html>
